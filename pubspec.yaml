name: tibeb
description: "tibeb is a free book + audiobook reader for everyone."
publish_to: "none"

version: 1.0.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.3.2
  package_info_plus: ^9.0.1
  google_fonts: ^8.1.0
  just_audio: ^0.10.6
  animations: ^2.1.1
  cached_network_image: ^3.4.1
  file_picker: ^11.0.2
  path: ^1.8.3
  epubx: ^4.0.0
  path_provider: ^2.1.2
  battery_plus: ^7.1.0
  http: ^1.6.0
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  epub_view: ^3.2.0
  intl: ^0.20.2
  pdfrx: ^2.4.4
  shared_preferences: ^2.2.2
  flutter_html: ^3.0.0-beta.2
  flutter_animate: ^4.5.2
  collection: ^1.18.0
  webview_flutter: ^4.13.1
  crypto: ^3.0.7
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  url_launcher: ^6.3.2
  tutorial_coach_mark: ^1.3.3
  share_plus: ^12.0.1
  android_intent_plus: ^6.0.0
  image: ^4.3.0
  flutter_quill: ^11.5.0
  markdown_quill: ^4.3.0
  markdown: ^7.2.2
  receive_sharing_intent: ^1.9.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  go_router: ^17.3.0
  riverpod_annotation: ^4.0.3
  drift: ^2.34.0
  sqlite3: ^3.3.4
  syncfusion_flutter_pdf: ^33.2.13

dependency_overrides:
  epubx:
    git:
      url: https://github.com/ScerIO/epubx.dart
      ref: dev
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  freezed: ^3.2.6-dev.1
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
flutter:
  uses-material-design: true

  assets:
    - assets/
